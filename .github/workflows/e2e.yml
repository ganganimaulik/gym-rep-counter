name: Playwright E2E Tests

on:
  push:
    branches: [ main, master ]
    paths:
      - 'components/**'
      - 'hooks/**'
      - 'utils/**'
      - 'modules/**'
      - 'e2e/**'
      - 'App.tsx'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'components/**'
      - 'hooks/**'
      - 'utils/**'
      - 'modules/**'
      - 'e2e/**'
      - 'App.tsx'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/e2e.yml'

# Cancel in-progress runs when a new push is made to the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers & Deps (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS Dependencies Only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build Web Application
        run: npx expo export -p web

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Run Playwright tests
        run: npx firebase emulators:exec --project gym-rep-counter "npx playwright test"

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
